services:
  firewall:
    build:
      context: .
      dockerfile: DockerFile
    container_name: firewall_router
    hostname: firewall_router
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      thesis_net:
        ipv4_address: 172.20.0.254    # Gateway IP for honeypot network
      attacker_net:
        ipv4_address: 192.168.100.254  # Gateway IP for attacker network
      agent_net:
        ipv4_address: 192.168.200.2 # API EndPoint for network information retrieval
    volumes:
      # Mount firewall scripts
      - ./firewall_scripts:/firewall/scripts:ro
      # Mount logs directory
      - ./firewall_logs:/firewall/logs:rw
      # Mount suricata logs
      - ./suricata/suricata_logs:/suricata/logs:rw
      # Mount rules directory
      - ./firewall_rules:/firewall/rules:rw
      # Sync timezone
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      # Management API
      - "5000:5000"

      # Suricata API
      - "7000:7000"
    environment:
      - ATTACKER_NETWORK=192.168.100.0/24
      - HONEYPOT_NETWORK=172.20.0.0/24
      - FIREWALL_MANAGEMENT_PORT=5000
    cap_add:
      - NET_ADMIN
      - NET_RAW
    privileged: true
    
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    restart: unless-stopped

  suricata:
    image: jasonish/suricata:latest
    container_name: suricata
    network_mode: "service:firewall"  # ← Share network namespace with the gateway
    volumes:
      - ./suricata/suricata.yaml:/etc/suricata/suricata.yaml
      - ./suricata/suricata_rules/threshold.config:/etc/suricata/threshold.config
      - ./suricata/suricata_rules/local.rules:/var/lib/suricata/rules/local.rules
      - ./suricata/suricata_rules/suricata.rules:/var/lib/suricata/rules/suricata.rules
      - ./suricata/suricata_rules/classification.config:/var/lib/suricata/rules/classification.config
      - ./suricata/suricata_logs:/var/log/suricata
      - ./suricata/run:/var/run/suricata  # Add this line
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    command: "suricata -i eth0"
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    depends_on:
        firewall:
            condition: service_started
    restart: unless-stopped
networks:
  attacker_net:
    external: true
    name: attacker_net
  thesis_net:
    external: true
    name: thesis_net
  agent_net:
    external: true
    name: agent_net
